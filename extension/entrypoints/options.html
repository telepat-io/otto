<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Otto Settings</title>
    <style>
      :root {
        --panel-bg: #fffdf7;
        --panel-border: #e7dcc4;
        --ink: #1f2937;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Avenir Next', 'Futura', 'Trebuchet MS', sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 5%, #fbe8bf 0%, transparent 40%),
          radial-gradient(circle at 90% 90%, #f4c8ba 0%, transparent 35%),
          linear-gradient(140deg, #f4f2ec, #f7f4e8 65%, #efe7dc);
      }

      main {
        max-width: 760px;
        margin: 24px auto;
        padding: 20px;
      }

      .panel {
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        padding: 18px;
        background: var(--panel-bg);
        box-shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 16px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
      }

      .toggle-row label {
        margin: 0;
        font-weight: 600;
      }

      .toggle-row input[type='checkbox'] {
        width: auto;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        border-radius: 10px;
        border: 1px solid #c9bca0;
        padding: 10px 12px;
        font-size: 14px;
        background: #fff;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 8px 14px;
        cursor: pointer;
        font-weight: 700;
      }

      #refreshStatus {
        background: #1d4ed8;
        color: #fff;
      }

      .status-card {
        margin-top: 16px;
        border: 1px solid #e2d6bb;
        border-radius: 12px;
        padding: 14px;
        background: #fffcf4;
      }

      #stateChip {
        display: inline-block;
        min-width: 56px;
        text-align: center;
        color: #fff;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 0.06em;
        padding: 4px 10px;
        font-weight: 700;
      }

      #stateTitle {
        margin-top: 8px;
        font-size: 18px;
        font-weight: 700;
        color: #111827;
      }

      #stateDetail,
      #pairingCode,
      #nodeId {
        margin-top: 6px;
        font-size: 14px;
      }

      #pairingCommand {
        margin-top: 8px;
        padding: 9px 11px;
        background: #0f172a;
        color: #f8fafc;
        border-radius: 9px;
        font-size: 14px;
        display: none;
        overflow-x: auto;
      }

      #pairingCommandToast {
        margin-top: 8px;
        padding: 6px 10px;
        border-radius: 8px;
        background: #0f5132;
        color: #ecfdf3;
        font-size: 12px;
        font-weight: 700;
        display: none;
      }

      #relaySaveStatus {
        margin-top: 10px;
        font-size: 13px;
        color: #334155;
      }

      @media (max-width: 640px) {
        main {
          margin: 12px;
          padding: 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>Otto Node Setup</h1>
        <p>Set relay URL, watch pairing state, and confirm live connection.</p>
        <label for="relayUrl">Relay URL</label>
        <input id="relayUrl" placeholder="ws://127.0.0.1:8787?role=node" />
        <div id="localDevLogRow" class="toggle-row">
          <input id="localDevLogStreamingEnabled" type="checkbox" />
          <label for="localDevLogStreamingEnabled">Send extension debug logs to relay (local dev)</label>
        </div>
        <div class="actions">
          <button id="refreshStatus">Refresh Status</button>
        </div>
        <div id="relaySaveStatus">Relay URL saves automatically</div>
        <div class="status-card">
          <span id="stateChip">SET</span>
          <div id="stateTitle">Loading status…</div>
          <div id="stateDetail"></div>
          <div id="pairingCode"></div>
          <div id="pairingCommandToast" aria-live="polite"></div>
          <pre id="pairingCommand"></pre>
          <div id="nodeId"></div>
        </div>
      </section>
    </main>
    <script type="module" src="../src/runtime/options-ui.ts"></script>
  </body>
</html>
