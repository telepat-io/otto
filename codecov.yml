codecov:
  require_ci_to_pass: no

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

flags:
  otto-cli:
    paths:
      - packages/cli/
    carryforward: true
  otto-relay:
    paths:
      - packages/relay/
    carryforward: true
  otto-extension:
    paths:
      - extension/
    carryforward: true

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false
