  <title id="snoopyLogoTitle">Snoopy Logo</title>
  <desc id="snoopyLogoDesc">Rounded gradient tile with a stylized letter S.</desc>
  <defs>
    <linearGradient id="snoopyBg" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B2A4A"/>
      <stop offset="0.52" stop-color="#165DAA"/>
      <stop offset="1" stop-color="#36A7E6"/>
    </linearGradient>
    <linearGradient id="snoopyStroke" x1="20" y1="14" x2="45" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
