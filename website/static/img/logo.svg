  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#snoopyBg)"/>

  <circle cx="32" cy="32" r="12" fill="none" stroke="url(#snoopyStroke)" stroke-width="5"/>

  <circle cx="48" cy="16" r="5" fill="#A7E8FF" fill-opacity="0.9"/>
