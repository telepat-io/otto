name: CLI Publish On Release

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: cli-release-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish-cli:
    name: Publish CLI from semver release tag
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Validate tag format and package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          if ! echo "$RELEASE_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release tag must match v<major>.<minor>.<patch>"
            exit 1
          fi

          RELEASE_VERSION="${RELEASE_TAG#v}"
          PKG_VERSION=$(node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('packages/cli/package.json','utf8')); process.stdout.write(pkg.version);")

          if [ "$PKG_VERSION" != "$RELEASE_VERSION" ]; then
            echo "CLI package version ($PKG_VERSION) does not match release tag version ($RELEASE_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: CLI quality gates
        run: |
          npm run --workspace @telepat/otto check
          npm run --workspace @telepat/otto lint
          npm run --workspace @telepat/otto build
          npm run --workspace @telepat/otto test

      - name: Publish
        run: npm publish --workspace @telepat/otto --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
