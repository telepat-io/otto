name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: ${{ matrix.label }} quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: cli
            workspace: '@telepat/otto'
            hasTests: true
          - label: relay
            workspace: '@telepat/otto-relay'
            hasTests: true
          - label: shared-protocol
            workspace: '@telepat/otto-protocol'
            hasTests: false
          - label: extension
            workspace: '@telepat/otto-extension'
            hasTests: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
            node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build protocol dependency
        if: matrix.workspace != '@telepat/otto-protocol'
        run: npm run --workspace @telepat/otto-protocol build

      - name: Check types
        run: npm run --workspace "${{ matrix.workspace }}" check

      - name: Lint
        run: npm run --workspace "${{ matrix.workspace }}" lint

      - name: Build
        run: npm run --workspace "${{ matrix.workspace }}" build

      - name: Test
        if: matrix.hasTests
        run: npm run --workspace "${{ matrix.workspace }}" test
