name: Extension Assets For CLI Release

on:
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: extension-release-assets-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  upload-extension-assets:
    name: Attach extension zip/checksum to semver release
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extension quality gates
        run: |
          npm run --workspace @telepat/otto-extension check
          npm run --workspace @telepat/otto-extension lint
          npm run --workspace @telepat/otto-extension build
          npm run --workspace @telepat/otto-extension test

      - name: Package extension zip
        run: npm run --workspace @telepat/otto-extension zip

      - id: prep
        name: Prepare semver release assets
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          VERSION="${RELEASE_TAG#v}"
          ZIP_NAME="otto-extension-${VERSION}-chrome-mv3.zip"
          CHECKSUM_NAME="${ZIP_NAME}.sha256"

          mapfile -t ZIP_FILES < <(find extension -type f -name '*.zip')
          if [ "${#ZIP_FILES[@]}" -eq 0 ]; then
            echo "No extension zip artifact found after wxt zip"
            exit 1
          fi

          cp "${ZIP_FILES[0]}" "$ZIP_NAME"
          shasum -a 256 "$ZIP_NAME" > "$CHECKSUM_NAME"

          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "checksum_name=$CHECKSUM_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          overwrite_files: true
          files: |
            ${{ steps.prep.outputs.zip_name }}
            ${{ steps.prep.outputs.checksum_name }}
