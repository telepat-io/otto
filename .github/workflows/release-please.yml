name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Open Release PR / Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      cli_release_created: ${{ steps.release.outputs['.--release_created'] }}
      cli_tag_name: ${{ steps.release.outputs['.--tag_name'] }}
      reconciled_tag: ${{ steps.reconcile.outputs.tag_name }}
    steps:
      - id: release
        name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v4
        if: steps.release.outputs.releases_created != 'true'
        with:
          fetch-depth: 0

      - id: reconcile
        name: Reconcile missing tags and releases for merged autorelease PRs
        if: steps.release.outputs.releases_created != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail

          REPO="${{ github.repository }}"
          RECONCILED_TAG=""

          echo "::group::Find merged autorelease: pending PRs"
          PENDING_PRS=$(gh pr list \
            --repo "$REPO" \
            --state merged \
            --label 'autorelease: pending' \
            --json number,title,body,mergeCommit \
            --jq '.[]' 2>/dev/null || true)
          echo "::endgroup::"

          if [ -z "$PENDING_PRS" ]; then
            echo "No merged autorelease: pending PRs found. Nothing to reconcile."
            echo "tag_name=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while IFS= read -r pr_info; do
            if [ -z "$pr_info" ]; then
              continue
            fi

            PR_NUMBER=$(echo "$pr_info" | jq -r '.number')
            PR_TITLE=$(echo "$pr_info" | jq -r '.title')
            PR_BODY=$(echo "$pr_info" | jq -r '.body // empty')
            MERGE_SHA=$(echo "$pr_info" | jq -r '.mergeCommit.oid // .mergeCommit // empty')

            echo "Processing PR #$PR_NUMBER: $PR_TITLE (merge: ${MERGE_SHA:0:12})"

            EXTRACTED_VERSION=$(echo "$PR_TITLE" | grep -oP '\d+\.\d+\.\d+' | head -1 || true)
            if [ -z "$EXTRACTED_VERSION" ]; then
              EXTRACTED_VERSION=$(echo "$PR_BODY" | grep -oP '\d+\.\d+\.\d+' | head -1 || true)
            fi
            if [ -z "$EXTRACTED_VERSION" ]; then
              echo "  Could not extract version from PR title or body, skipping"
              continue
            fi

            TAG="v$EXTRACTED_VERSION"
            echo "  Expected tag: $TAG"

            if git tag -l "$TAG" | grep -q .; then
              echo "  Tag $TAG already exists"
            else
              echo "  Tag $TAG not found, will be created by GitHub release"
            fi

            RELEASE_EXISTS=$(gh release view "$TAG" --repo "$REPO" --json tagName --jq '.tagName' 2>/dev/null || true)
            if [ "$RELEASE_EXISTS" = "$TAG" ]; then
              echo "  GitHub release for $TAG already exists"
            else
              echo "  Creating GitHub release for $TAG (creates tag automatically)"
              BODY=$(git show "$MERGE_SHA:CHANGELOG.md" 2>/dev/null | awk "/^## \\[${EXTRACTED_VERSION}\]/{found=1} found{print}" | awk 'NR>1 && /^## \[/{exit} {print}' || echo "Release ${TAG}")
              gh release create "$TAG" --repo "$REPO" --target "$MERGE_SHA" --title "$TAG" --notes "$BODY"
              echo "  GitHub release for $TAG created"
            fi

            echo "  Removing autorelease: pending label from PR #$PR_NUMBER"
            gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label 'autorelease: pending' || true
            echo "  Adding autorelease: tagged label to PR #$PR_NUMBER"
            gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label 'autorelease: tagged' || true

            RECONCILED_TAG="$TAG"
          done <<< "$PENDING_PRS"

          echo "tag_name=$RECONCILED_TAG" >> "$GITHUB_OUTPUT"

          if [ -n "$RECONCILED_TAG" ]; then
            echo "Reconciled release tag: $RECONCILED_TAG"
          else
            echo "No releases reconciled."
          fi

  determine-release-tag:
    name: Determine release tag for downstream jobs
    needs: release-please
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ needs.release-please.outputs.cli_release_created }}" = "true" ]; then
            echo "tag=${{ needs.release-please.outputs.cli_tag_name }}" >> "$GITHUB_OUTPUT"
            echo "Release created by release-please: ${{ needs.release-please.outputs.cli_tag_name }}"
            exit 0
          fi

          if [ -n "${{ needs.release-please.outputs.reconciled_tag }}" ]; then
            echo "tag=${{ needs.release-please.outputs.reconciled_tag }}" >> "$GITHUB_OUTPUT"
            echo "Release reconciled from stuck PR: ${{ needs.release-please.outputs.reconciled_tag }}"
            exit 0
          fi

          echo "No new release and no reconciliation. Skipping publish."
          echo "tag=" >> "$GITHUB_OUTPUT"

  publish-packages:
    name: Publish npm packages from semver release tag
    if: needs.determine-release-tag.outputs.release_tag != ''
    needs:
      - release-please
      - determine-release-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ needs.determine-release-tag.outputs.release_tag }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.determine-release-tag.outputs.release_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Validate tag format and package versions
        run: |
          set -euo pipefail

          if ! echo "$RELEASE_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release tag must match v<major>.<minor>.<patch>"
            exit 1
          fi

          RELEASE_VERSION="${RELEASE_TAG#v}"
          CLI_VERSION=$(node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('packages/cli/package.json','utf8')); process.stdout.write(pkg.version);")
          RELAY_VERSION=$(node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('packages/relay/package.json','utf8')); process.stdout.write(pkg.version);")
          PROTOCOL_VERSION=$(node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('packages/shared-protocol/package.json','utf8')); process.stdout.write(pkg.version);")

          for pkg in CLI RELAY PROTOCOL; do
            ver_var="${pkg}_VERSION"
            if [ "${!ver_var}" != "$RELEASE_VERSION" ]; then
              echo "$pkg package version (${!ver_var}) does not match release tag version ($RELEASE_VERSION)"
              exit 1
            fi
          done

          echo "Release tag: $RELEASE_TAG (CLI: $CLI_VERSION, relay: $RELAY_VERSION, protocol: $PROTOCOL_VERSION)"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Package quality gates
        run: |
          npm run --workspace @telepat/otto-protocol check
          npm run --workspace @telepat/otto-protocol lint
          npm run --workspace @telepat/otto-protocol build

          npm run --workspace @telepat/otto-relay check
          npm run --workspace @telepat/otto-relay lint
          npm run --workspace @telepat/otto-relay build
          npm run --workspace @telepat/otto-relay test

          npm run --workspace @telepat/otto check
          npm run --workspace @telepat/otto lint
          npm run --workspace @telepat/otto build
          npm run --workspace @telepat/otto test

      - name: Publish protocol, relay, and CLI
        run: |
          npm publish --workspace @telepat/otto-protocol --access public --provenance
          npm publish --workspace @telepat/otto-relay --access public --provenance
          npm publish --workspace @telepat/otto --access public --provenance

  upload-extension-assets:
    name: Attach extension zip/checksum to semver release
    if: needs.determine-release-tag.outputs.release_tag != ''
    needs:
      - release-please
      - determine-release-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.determine-release-tag.outputs.release_tag }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.determine-release-tag.outputs.release_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build shared protocol
        run: npm run --workspace @telepat/otto-protocol build

      - name: Extension quality gates
        run: |
          npm run --workspace @telepat/otto-extension check
          npm run --workspace @telepat/otto-extension lint
          npm run --workspace @telepat/otto-extension build
          npm run --workspace @telepat/otto-extension test

      - name: Package extension zip
        run: npm run --workspace @telepat/otto-extension zip

      - id: prep
        name: Prepare semver release assets
        run: |
          set -euo pipefail

          VERSION="${RELEASE_TAG#v}"
          ZIP_NAME="otto-extension-${VERSION}-chrome-mv3.zip"
          CHECKSUM_NAME="${ZIP_NAME}.sha256"

          mapfile -t ZIP_FILES < <(find extension/output -type f -name '*.zip' | head -1)
          if [ "${#ZIP_FILES[@]}" -eq 0 ] || [ -z "${ZIP_FILES[0]}" ]; then
            echo "No extension zip artifact found in extension/output after wxt zip"
            exit 1
          fi

          cp "${ZIP_FILES[0]}" "$ZIP_NAME"
          echo "Copied source zip: ${ZIP_FILES[0]} → ${ZIP_NAME}"
          shasum -a 256 "$ZIP_NAME" > "$CHECKSUM_NAME"

          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "checksum_name=$CHECKSUM_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "${{ steps.prep.outputs.zip_name }}" \
            "${{ steps.prep.outputs.checksum_name }}" \
            --clobber

      - name: Verify assets attached
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSETS_JSON=$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')
          echo "Release assets:"
          echo "$ASSETS_JSON"

          if ! echo "$ASSETS_JSON" | grep -qF "${{ steps.prep.outputs.zip_name }}"; then
            echo "FAIL: extension zip not found in release assets"
            exit 1
          fi

          if ! echo "$ASSETS_JSON" | grep -qF "${{ steps.prep.outputs.checksum_name }}"; then
            echo "FAIL: extension checksum not found in release assets"
            exit 1
          fi

          echo "Both extension assets confirmed in release"