name: Manual CLI Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: CLI version to publish (example: 0.2.3)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: manual-cli-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-cli:
    name: Validate and publish CLI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Validate version, tag, and ancestry
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if ! echo "$INPUT_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Expected semver version like 0.2.3"
            exit 1
          fi

          TAG="v$INPUT_VERSION"
          git fetch origin main --tags --force

          if ! git show-ref --verify --quiet "refs/tags/$TAG"; then
            echo "Tag $TAG does not exist"
            exit 1
          fi

          if ! git merge-base --is-ancestor "$TAG^{commit}" origin/main; then
            echo "Tag $TAG is not an ancestor of origin/main"
            exit 1
          fi

      - name: Checkout release tag
        run: git checkout "v${{ inputs.version }}"

      - name: Validate package version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('packages/cli/package.json','utf8')); process.stdout.write(pkg.version);")
          if [ "$PKG_VERSION" != "$INPUT_VERSION" ]; then
            echo "packages/cli version ($PKG_VERSION) does not match requested version ($INPUT_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: CLI quality gates
        run: |
          npm run --workspace @telepat/otto check
          npm run --workspace @telepat/otto lint
          npm run --workspace @telepat/otto build
          npm run --workspace @telepat/otto test

      - name: Publish
        run: npm publish --workspace @telepat/otto --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
